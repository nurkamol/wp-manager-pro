name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: TypeScript Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Report bundle size
        run: |
          echo "### Bundle Sizes" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          JS_SIZE=$(du -sh assets/build/index.js | cut -f1)
          CSS_SIZE=$(du -sh assets/build/style.css | cut -f1)
          echo "| index.js | $JS_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| style.css | $CSS_SIZE |" >> $GITHUB_STEP_SUMMARY
