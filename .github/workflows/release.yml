name: Release

# Trigger: git tag v1.8.0 && git push origin v1.8.0
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # required to create releases and upload assets

jobs:
  release:
    name: Build & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # ZIP must contain a top-level wp-manager-pro/ folder so WordPress
      # recognises the upload as an in-place upgrade, not a new plugin.
      - name: Package ZIP
        run: |
          TAG="${GITHUB_REF_NAME}"
          ZIP="wp-manager-pro-${TAG}.zip"
          cd ..
          zip -r "${ZIP}" \
            wp-manager-pro/wp-manager-pro.php \
            wp-manager-pro/includes/ \
            wp-manager-pro/assets/build/
          mv "${ZIP}" wp-manager-pro/
          echo "ZIP_NAME=${ZIP}" >> "$GITHUB_ENV"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}"
          body_path: releases/${{ github.ref_name }}.md
          files: ${{ env.ZIP_NAME }}
          fail_on_unmatched_files: true
